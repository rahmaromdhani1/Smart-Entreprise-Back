<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEMS - Reset Password</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #8B5CF6 0%, #EC4899 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 24px;
      padding: 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo {
      font-size: 48px;
      margin-bottom: 10px;
    }
    h1 {
      color: #8B5CF6;
      font-size: 28px;
      margin-bottom: 10px;
    }
    p {
      color: #6B7280;
      margin-bottom: 30px;
    }
    .input-wrapper {
      position: relative;
      width: 100%;
      margin-bottom: 15px;
    }
    input {
      width: 100%;
      padding: 14px;
      padding-right: 45px;
      border: 2px solid #E5E7EB;
      border-radius: 12px;
      font-size: 16px;
      transition: border 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #8B5CF6;
    }
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      color: #6B7280;
      transition: color 0.2s;
    }
    .toggle-password:hover {
      color: #8B5CF6;
    }
    .btn {
      background: linear-gradient(135deg, #8B5CF6, #EC4899);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      transition: transform 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    .btn:active {
      transform: translateY(0);
    }
    .btn-secondary {
      background: #6B7280;
      margin-top: 15px;
    }
    .error {
      color: #EF4444;
      font-size: 14px;
      margin: 10px 0;
      min-height: 20px;
    }
    .success {
      color: #10B981;
      font-size: 14px;
      margin: 10px 0;
    }
    .divider {
      margin: 25px 0;
      color: #9CA3AF;
      font-size: 14px;
    }
    .loading {
      opacity: 0.6;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🔐</div>
    <h1>SEMS</h1>
    <p>Reset your password</p>
    
    <div id="resetForm">
      <div class="input-wrapper">
        <input 
          type="password" 
          id="password" 
          placeholder="New password (min. 8 characters)" 
          minlength="8"
        />
        <button
          type="button"
          class="toggle-password"
          onclick="togglePasswordVisibility('password')"
        >
          <svg id="password-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
      
      <div class="input-wrapper">
        <input 
          type="password" 
          id="confirmPassword" 
          placeholder="Confirm new password" 
          minlength="8"
        />
        <button
          type="button"
          class="toggle-password"
          onclick="togglePasswordVisibility('confirmPassword')"
        >
          <svg id="confirmPassword-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
      
      <div id="error" class="error"></div>
      <div id="success" class="success"></div>
      
      <button class="btn" onclick="resetPassword(event)">
        Reset Password
      </button>
      
      <div class="divider">OR</div>
      
      <button class="btn btn-secondary" onclick="openApp()">
         Open in SEMS App
      </button>
    </div>

    <div id="successMessage" style="display: none;">
      <h2 style="color: #10B981; margin: 20px 0;">Success!</h2>
      <p>Your password has been reset successfully.</p>
      <button class="btn" onclick="openAppToLogin()">
        Open SEMS App
      </button>
    </div>
  </div>

  <script>
    
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token') || window.location.pathname.split('/').pop();

    console.log('Token récupéré:', token);

    
    function togglePasswordVisibility(inputId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(inputId + '-icon');
      
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        `;
      } else {
        input.type = 'password';
        icon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        `;
      }
    }

    
    async function resetPassword(event) {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorDiv = document.getElementById('error');
      const successDiv = document.getElementById('success');
      const resetForm = document.getElementById('resetForm');
      const successMessage = document.getElementById('successMessage');
      event.preventDefault();
      
      errorDiv.textContent = '';
      successDiv.textContent = '';

      if (!password || !confirmPassword) {
        errorDiv.textContent = '⚠️ Please fill in all fields';
        return;
      }

      if (password.length < 8) {
        errorDiv.textContent = '⚠️ Password must be at least 8 characters';
        return;
      }

      if (password !== confirmPassword) {
        errorDiv.textContent = '⚠️ Passwords do not match';
        return;
      }

      const btn = event.target;
      const originalText = btn.textContent;
      btn.textContent = 'Loading...';
      btn.classList.add('loading');

      try {
        const API_URL = 'http://172.28.40.165:5000/api';
        const fullURL = `${API_URL}/auth/reset-password`;
        
        console.log('🔗 Tentative d\'envoi de la requête POST à :', fullURL);
        
        const response = await fetch(fullURL, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ 
            token: token,
            newPassword: password,
            confirmPassword: confirmPassword 
          })
        });

        console.log('📤 Requête envoyée, statut HTTP :', response.status);
        const data = await response.json();
        console.log('📥 Réponse reçue du serveur :', data);

        if (response.ok) {
          resetForm.style.display = 'none';
          successMessage.style.display = 'block';
        } else {
          errorDiv.textContent = `❌ ${data.message || 'Invalid or expired link'}`;
          btn.textContent = originalText;
          btn.classList.remove('loading');
        }
      } catch (error) {
        console.error('Error:', error);
        errorDiv.textContent = '❌ Network error. Please check your connection.';
        btn.textContent = originalText;
        btn.classList.remove('loading');
      }
    }

    
    function openApp() {
      // ⚠️ IMPORTANT: Changez ceci selon votre environnement
      const isExpoDev = true; // Mettez false en production
      
      let deepLink;
      
      if (isExpoDev) {
        // 🔧 REMPLACEZ PAR VOTRE IP EXPO (visible dans le terminal)
        // Format: exp://192.168.X.X:8081/--/reset-password?token=...
        const expoIp = '172.28.40.165'; 
        deepLink = `exp://${expoIp}:8081/--/reset-password?token=${token}`;
      } else {
        // Pour l'app buildée (après eas build)
        deepLink = `sems://reset-password?token=${token}`;
      }
      
      console.log('🚀 Opening app with:', deepLink);
      
      // Tenter d'ouvrir l'app
      window.location.href = deepLink;
      
      // Fallback si l'app n'est pas installée
      setTimeout(() => {
        const userResponse = confirm(
          'Unable to open the SEMS app.\n\n' +
          (isExpoDev ? 'Make sure Expo Go is installed and running.\n\n' : 'Make sure the app is installed on your device.\n\n') +
          'Click OK to continue on the web.'
        );
        
        if (!userResponse) {
          document.getElementById('resetForm').style.display = 'block';
          document.getElementById('successMessage').style.display = 'none';
        }
      }, 2000);
    }

    function openAppToLogin() {
      const isExpoDev = true;
      let deepLink;
      
      if (isExpoDev) {
        const expoIp = '172.28.40.165';
        
        deepLink = `exp://${expoIp}:8081`;
      } else {
        
        deepLink = `sems://`;
      }
      
      console.log('🚀 Opening app to login page:', deepLink);
      window.location.href = deepLink;
      
      setTimeout(() => {
        alert('Please open the SEMS app and login with your new password.');
      }, 2000);
    }
    // Permettre de soumettre avec Enter
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('confirmPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          resetPassword(e);
        }
      });
    });
  </script>
</body>
</html>
